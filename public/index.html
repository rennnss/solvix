<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solvix — University Complaint Tracker</title>
  <meta name="description"
    content="Solvix is a university complaint tracking system. Sign in to manage and monitor campus complaints.">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="login-page">

    <div class="login-card">

      <!-- Left Branding Panel -->
      <div class="login-branding">
        <div class="login-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
            <path d="M6 12v5c0 1.1 2.7 3 6 3s6-1.9 6-3v-5" />
          </svg>
        </div>
        <h1>Solvix</h1>
        <p>University Complaint Tracker</p>

        <div class="branding-features">
          <div class="feature-item">
            <span class="feature-dot"></span>
            Track &amp; manage campus complaints
          </div>
          <div class="feature-item">
            <span class="feature-dot"></span>
            Real-time status updates
          </div>
          <div class="feature-item">
            <span class="feature-dot"></span>
            Priority-based resolution
          </div>
        </div>
      </div>

      <!-- Right Form Panel -->
      <div class="login-form-panel">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to access your complaint tracker</p>

        <form id="loginForm" autocomplete="off">
          <div class="form-group">
            <label for="regNumber">Register Number</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              <input type="text" id="regNumber" placeholder="Enter your register number" required>
            </div>
          </div>

          <div class="form-group">
            <label for="email">SRM Email ID</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
              </svg>
              <input type="email" id="email" placeholder="yourname@srmist.edu.in" required>
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input type="password" id="password" placeholder="Enter your password" required>
              <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round" id="eyeIcon">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <a href="#" class="forgot-link">Forgot Password?</a>

          <button type="submit" class="btn-primary" id="loginBtn">Login</button>
        </form>

        <div class="divider">or</div>

        <p class="register-link">Don't have an account? <a href="#">Register here</a></p>
      </div>

    </div>

  </div>

  <script src="app.js"></script>
</body>

</html>
